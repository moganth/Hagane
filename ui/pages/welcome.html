<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Setup</title>
<style>
/* Inline base styles so each page is fully self-contained */
:root{--accent:#0078D4;--accent-dark:#005A9E;--accent-light:#EBF3FB;--bg:#fff;--bg-alt:#F5F5F5;--text:#1A1A1A;--text-muted:#6B6B6B;--border:#E0E0E0;--radius:6px;--font:'Segoe UI',system-ui,sans-serif;--shadow:0 2px 8px rgba(0,0,0,.10)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);overflow:hidden;user-select:none;-webkit-font-smoothing:antialiased}
.root{display:flex;flex-direction:column;height:100vh}
.banner{flex-shrink:0;display:flex;align-items:stretch;min-height:96px;background:var(--bg-alt);border-bottom:1px solid var(--border);overflow:hidden}
.brand-tile{width:96px;min-width:96px;background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%);display:flex;align-items:center;justify-content:center}
.banner-logo{width:48px;height:48px;object-fit:contain;display:none}
.banner-logo-ph{width:48px;height:48px;background:rgba(255,255,255,.22);border-radius:8px}
.banner-art{flex:1;background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%);background-size:cover;background-position:center}
.content{flex:1;overflow-y:auto;padding:32px 36px;display:flex;flex-direction:column;gap:20px;animation:fadeIn .2s ease}
.footer{flex-shrink:0;display:flex;justify-content:flex-end;align-items:center;gap:8px;padding:12px 20px;border-top:1px solid var(--border);background:var(--bg-alt)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:7px 20px;border-radius:var(--radius);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;border:1px solid transparent;min-width:90px;transition:background .15s,border-color .15s,opacity .15s}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover:not(:disabled){background:var(--accent-dark);border-color:var(--accent-dark)}
.btn-secondary{background:transparent;color:var(--text);border-color:var(--border)}
.btn-secondary:hover:not(:disabled){background:var(--bg-alt)}
.btn-ghost{background:transparent;color:var(--text-muted);border-color:transparent}
.btn-ghost:hover:not(:disabled){color:var(--text);background:var(--bg-alt)}
.btn:disabled{opacity:.45;cursor:not-allowed}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.welcome-hero{display:flex;flex-direction:column;align-items:center;gap:16px;padding:16px 0 8px}
.hero-icon{font-size:64px;line-height:1}
.hero-title{font-size:24px;font-weight:700;text-align:center}
.hero-sub{font-size:14px;color:var(--text-muted);text-align:center;line-height:1.6;max-width:480px}
.info-box{background:var(--bg-alt);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;font-size:13px;color:var(--text-muted);line-height:1.6}
</style>
</head>
<body>
<div class="root">
  <div class="banner">
    <div class="brand-tile">
      <img id="banner-logo" class="banner-logo" alt="">
      <div id="banner-logo-ph" class="banner-logo-ph"></div>
    </div>
    <div id="banner-art" class="banner-art"></div>
  </div>
  <div class="content">
    <div class="welcome-hero">
      <div class="hero-icon">📦</div>
      <div class="hero-title" id="welcome-title">Welcome to Setup</div>
      <div class="hero-sub" id="welcome-sub">
        This wizard will guide you through the installation process.<br>
        Click <strong>Next</strong> to begin.
      </div>
    </div>
    <div class="info-box" id="info-box">
      Before continuing, please make sure all other applications are closed.
    </div>
  </div>

  <div class="footer">
    <button id="btn-cancel" class="btn btn-ghost">Cancel</button>
    <button id="btn-next"   class="btn btn-primary">Next →</button>
  </div>
</div>

<script>
function onPageStateUpdate(s) {
  applyTheme(s);
  const isUninstall = !!s.is_uninstall;
  document.getElementById('welcome-title').textContent = isUninstall
    ? 'Welcome to ' + s.app_name + ' Uninstall'
    : 'Welcome to ' + s.app_name + ' Setup';
  if (s.app_description) {
    document.getElementById('welcome-sub').innerHTML =
      s.app_description + '<br><br>Click <strong>Next</strong> to begin.';
  }
  if (isUninstall && !s.app_description) {
    document.getElementById('welcome-sub').innerHTML =
      'This wizard will remove <strong>' + s.app_name + '</strong> from your computer.<br><br>Click <strong>Next</strong> to continue.';
  }
  if (s.app_website) {
    document.getElementById('info-box').innerHTML =
      'Publisher: <strong>' + s.app_publisher + '</strong><br>' +
      'Website: <a id="app-website-link" href="' + s.app_website + '" style="color:var(--accent)">' + s.app_website + '</a>';
  }
}
</script>
<script>
// ── Inline bridge (critical subset) ──────────────────────────────────────────
function send(t,p={}){const m=JSON.stringify({type:t,...p});if(window.chrome&&window.chrome.webview)window.chrome.webview.postMessage(m);else console.log('[→]',m)}
window.__engineEvent=function(e){if(e.event==='state_update'){applyTheme(e.state);onPageStateUpdate&&onPageStateUpdate(e.state)}};
function applyTheme(s){const r=document.documentElement;r.style.setProperty('--accent',s.accent_color||'#0078D4');r.style.setProperty('--accent-dark',s.accent_dark_color||'#005A9E');r.style.setProperty('--accent-light',s.accent_light_color||'#EBF3FB');r.style.setProperty('--bg',s.background_color||'#FFFFFF');r.style.setProperty('--bg-alt',s.surface_color||'#F5F5F5');r.style.setProperty('--text',s.text_color||'#1A1A1A');r.style.setProperty('--text-muted',s.text_muted_color||'#6B6B6B');r.style.setProperty('--border',s.border_color||'#E0E0E0');r.style.setProperty('--radius',(s.border_radius??6)+'px');r.style.setProperty('--font',s.font_family||"'Segoe UI',system-ui,sans-serif");r.style.setProperty('--success',s.success_color||'#107C10');r.style.setProperty('--success-bg',s.success_bg_color||'#F7F9F8');r.style.setProperty('--error',s.error_color||'#C42B1C');r.style.setProperty('--error-bg',s.error_bg_color||'#FFF7F6');r.style.setProperty('--progress',s.progress_color||'#0078D4');r.style.setProperty('--progress-light',s.progress_light_color||'#EBF3FB');const iconAsset=s.logo_b64;if(iconAsset){const l=document.getElementById('banner-logo');if(l){l.src=(iconAsset.startsWith&&iconAsset.startsWith('data:'))?iconAsset:'data:image/png;base64,'+iconAsset;l.style.display='block';const p=document.getElementById('banner-logo-ph');if(p)p.style.display='none'}}const bannerAsset=s.banner_b64;if(bannerAsset){const art=document.getElementById('banner-art');if(art){const src=(bannerAsset.startsWith&&bannerAsset.startsWith('data:'))?bannerAsset:'data:image/png;base64,'+bannerAsset;art.style.backgroundImage='url('+src+')';art.style.backgroundSize='cover';art.style.backgroundPosition='center';}}}
function showCancelModal(){if(document.getElementById('cancel-modal-overlay'))return;const o=document.createElement('div');o.id='cancel-modal-overlay';o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:9999';const c=document.createElement('div');c.style.cssText='width:min(420px,calc(100% - 32px));background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 16px 36px rgba(0,0,0,.24);padding:18px';c.innerHTML='<div style="font-size:16px;font-weight:600;margin-bottom:6px">Cancel installation?</div><div style="font-size:13px;color:var(--text-muted);line-height:1.5">Setup is not complete. If you exit now, no further changes will be made.</div>';const a=document.createElement('div');a.style.cssText='display:flex;justify-content:flex-end;gap:8px;margin-top:16px';const k=document.createElement('button');k.className='btn btn-secondary';k.textContent='Continue setup';const x=document.createElement('button');x.className='btn btn-primary';x.textContent='Exit setup';a.appendChild(k);a.appendChild(x);c.appendChild(a);o.appendChild(c);document.body.appendChild(o);const close=()=>o.remove();k.onclick=close;o.onclick=(e)=>{if(e.target===o)close()};x.onclick=()=>{close();send('cancel')}}
function shade(h,p){const n=parseInt(h.replace('#',''),16);const r=Math.min(255,Math.max(0,(n>>16)+p*2.55|0));const g=Math.min(255,Math.max(0,((n>>8)&0xff)+p*2.55|0));const b=Math.min(255,Math.max(0,(n&0xff)+p*2.55|0));return`#${((r<<16)|(g<<8)|b).toString(16).padStart(6,'0')}`}
document.addEventListener('DOMContentLoaded',()=>{
  send('ready');
  document.addEventListener('click', (e) => {
    const link = e.target && e.target.closest ? e.target.closest('#app-website-link') : null;
    if (!link) return;
    e.preventDefault();
    send('open_url', { url: link.getAttribute('href') || link.textContent || '' });
  });
  document.getElementById('btn-next').onclick=()=>send('next');
  document.getElementById('btn-cancel').onclick=()=>showCancelModal();
});
</script>
</body>
</html>
