<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Installing</title>
<style>
:root{--accent:#0078D4;--accent-dark:#005A9E;--bg:#fff;--bg-alt:#F5F5F5;--text:#1A1A1A;--text-muted:#6B6B6B;--border:#E0E0E0;--success:#107C10;--error:#C42B1C;--radius:6px;--font:'Segoe UI',system-ui,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);overflow:hidden;user-select:none;-webkit-font-smoothing:antialiased}
.root{display:flex;flex-direction:column;height:100vh}
.banner{flex-shrink:0;display:flex;align-items:stretch;min-height:96px;background:var(--bg-alt);border-bottom:1px solid var(--border);overflow:hidden}
.brand-tile{width:96px;min-width:96px;background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%);display:flex;align-items:center;justify-content:center}
.banner-logo{width:48px;height:48px;object-fit:contain;display:none}
.banner-logo-ph{width:48px;height:48px;background:rgba(255,255,255,.22);border-radius:8px}
.banner-art{flex:1;background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%);background-size:cover;background-position:center}
.content{flex:1;overflow:hidden;padding:14px 22px;display:flex;flex-direction:column;gap:8px;animation:fadeIn .2s ease;min-height:0}
.footer{flex-shrink:0;display:flex;justify-content:flex-end;align-items:center;gap:8px;padding:12px 20px;border-top:1px solid var(--border);background:var(--bg-alt)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:7px 20px;border-radius:var(--radius);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;border:1px solid transparent;min-width:90px;transition:background .15s,opacity .15s}
.btn-ghost{background:transparent;color:var(--text-muted);border-color:transparent}.btn-ghost:hover:not(:disabled){color:var(--text);background:var(--bg-alt)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);display:none}.btn-primary:hover{background:var(--accent-dark)}
.btn:disabled{opacity:.45;cursor:not-allowed}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.page-title{font-size:17px;font-weight:600}
.progress-header{display:flex;justify-content:space-between;align-items:baseline}
.progress-label{font-size:13px;color:var(--text-muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.progress-pct{font-size:13px;font-weight:600;color:var(--accent);flex-shrink:0;margin-left:10px}
.progress-wrap{background:var(--bg-alt);border:1px solid var(--border);border-radius:20px;height:10px;overflow:hidden;flex-shrink:0}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--progress),var(--progress-light));border-radius:20px;transition:width .35s ease;min-width:4px;position:relative;overflow:hidden}
.progress-bar::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:shimmer 1.4s infinite}
@keyframes shimmer{to{left:160%}}
.status-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);flex-shrink:0}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.log-box{flex:1 1 auto;min-height:0;overflow-y:auto;font-family:'Cascadia Code','Consolas',monospace;font-size:12px;background:#111827;color:#d6defa;padding:12px 14px;border-radius:10px;line-height:1.6}
.log-box::-webkit-scrollbar{width:5px}.log-box::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
.log-line{padding:1px 0}.log-line.ok{color:#9ece6a}.log-line.err{color:#f7768e}.log-line.info{color:#7aa2f7}
</style></head><body>
<div class="root">
  <div class="banner">
    <div class="brand-tile">
      <img id="banner-logo" class="banner-logo" alt="">
      <div id="banner-logo-ph" class="banner-logo-ph"></div>
    </div>
    <div id="banner-art" class="banner-art"></div>
  </div>
  <div class="content">
    <div class="page-title" id="page-title">Working</div>
    <div class="progress-header">
      <div class="progress-label" id="progress-label">Preparing…</div>
      <div class="progress-pct" id="progress-pct">0%</div>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
    <div class="status-row"><div class="spinner" id="spinner"></div><span id="status-text">Please wait…</span></div>
    <div class="log-box" id="log-box"></div>
  </div>
  <div class="footer">
    <button id="btn-cancel" class="btn btn-ghost">Cancel</button>
    <button id="btn-next"   class="btn btn-primary">Next →</button>
  </div>
</div>
<script>
let _installStarted = false;
let _installDone = false;
let _pollTimer = null;

function applyTheme(s){const r=document.documentElement;r.style.setProperty('--accent',s.accent_color||'#0078D4');r.style.setProperty('--accent-dark',s.accent_dark_color||'#005A9E');r.style.setProperty('--accent-light',s.accent_light_color||'#EBF3FB');r.style.setProperty('--bg',s.background_color||'#FFFFFF');r.style.setProperty('--bg-alt',s.surface_color||'#F5F5F5');r.style.setProperty('--text',s.text_color||'#1A1A1A');r.style.setProperty('--text-muted',s.text_muted_color||'#6B6B6B');r.style.setProperty('--border',s.border_color||'#E0E0E0');r.style.setProperty('--radius',(s.border_radius??6)+'px');r.style.setProperty('--font',s.font_family||"'Segoe UI',system-ui,sans-serif");r.style.setProperty('--success',s.success_color||'#107C10');r.style.setProperty('--success-bg',s.success_bg_color||'#F7F9F8');r.style.setProperty('--error',s.error_color||'#C42B1C');r.style.setProperty('--error-bg',s.error_bg_color||'#FFF7F6');r.style.setProperty('--progress',s.progress_color||'#0078D4');r.style.setProperty('--progress-light',s.progress_light_color||'#EBF3FB');}

function onPageStateUpdate(s) {
  applyTheme(s);
  const isUninstall = !!s.is_uninstall;
  document.getElementById('page-title').textContent = isUninstall ? 'Uninstalling' : 'Installing';
  const iconAsset = s.logo_b64;
  if (iconAsset) {
    const l = document.getElementById("banner-logo");
    l.src = (iconAsset.startsWith && iconAsset.startsWith("data:")) ? iconAsset : "data:image/png;base64," + iconAsset;
    l.style.display = "block";
    document.getElementById("banner-logo-ph").style.display = "none";
  }
  const bannerAsset = s.banner_b64;
  if (bannerAsset) {
    const art = document.getElementById("banner-art");
    if (art) {
      const src = (bannerAsset.startsWith && bannerAsset.startsWith("data:")) ? bannerAsset : "data:image/png;base64," + bannerAsset;
      art.style.backgroundImage = "url(" + src + ")";
      art.style.backgroundSize = "cover";
      art.style.backgroundPosition = "center";
    }
  }
  // Restore progress if state already has it (e.g. page reload)
  if (s.progress) {
    updateProgress(s.progress.percent, s.progress.current_label, s.progress.current_step, s.progress.total_steps);
    if (s.progress.log) s.progress.log.forEach(l => addLog(l, false));
  }
  if (s.install_succeeded !== null && s.install_succeeded !== undefined) {
    handleInstallComplete({success: s.install_succeeded, error: s.install_error});
  }
  // Trigger install on first state update if not already started
  if (!_installStarted) {
    _installStarted = true;
    send('next'); // tells engine to begin install steps
  }
}

function updateProgress(pct, label, current, total) {
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-label').textContent = label || '';
  document.getElementById('status-text').textContent =
    (current && total) ? `Step ${current} of ${total}` : 'Please wait…';
}

function addLog(text, isErr) {
  const box = document.getElementById('log-box');
  const line = document.createElement('div');
  line.className = 'log-line' + (isErr ? ' err' : '');
  const ts = new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  line.textContent = `[${ts}] ${text}`;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function handleInstallComplete(e) {
  _installDone = true;
  const isUninstall = (window.__lastState && window.__lastState.is_uninstall) || false;
  if (_pollTimer) {
    clearInterval(_pollTimer);
    _pollTimer = null;
  }
  document.getElementById('spinner').style.display = 'none';
  const btnCancel = document.getElementById('btn-cancel');
  const btnNext   = document.getElementById('btn-next');
  if (e.success) {
    document.getElementById('page-title').textContent = isUninstall ? 'Uninstall Complete' : 'Installation Complete';
    document.getElementById('progress-bar').style.width = '100%';
    document.getElementById('progress-pct').textContent = '100%';
    document.getElementById('progress-label').textContent = 'Done';
    document.getElementById('status-text').textContent = isUninstall ? 'All uninstall steps completed.' : 'All steps completed.';
    btnCancel.style.display = 'none';
    btnNext.style.display = 'inline-flex';
    addLog(isUninstall ? 'Uninstall completed successfully.' : 'Installation completed successfully.', false);
  } else {
    document.getElementById('page-title').textContent = isUninstall ? 'Uninstall Failed' : 'Installation Failed';
    btnCancel.textContent = 'Close';
    btnCancel.disabled = false;
    addLog('FAILED: ' + (e.error || 'Unknown error'), true);
  }
}

function send(t,p={}){const m=JSON.stringify({type:t,...p});if(window.chrome&&window.chrome.webview)window.chrome.webview.postMessage(m);else console.log('[→]',m)}
function showCancelModal(){if(document.getElementById('cancel-modal-overlay'))return;const o=document.createElement('div');o.id='cancel-modal-overlay';o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:9999';const c=document.createElement('div');c.style.cssText='width:min(420px,calc(100% - 32px));background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 16px 36px rgba(0,0,0,.24);padding:18px';c.innerHTML='<div style="font-size:16px;font-weight:600;margin-bottom:6px">Cancel installation?</div><div style="font-size:13px;color:var(--text-muted);line-height:1.5">Installation is in progress. Exiting now will trigger rollback of applied steps.</div>';const a=document.createElement('div');a.style.cssText='display:flex;justify-content:flex-end;gap:8px;margin-top:16px';const k=document.createElement('button');k.className='btn btn-secondary';k.textContent='Continue setup';const x=document.createElement('button');x.className='btn btn-primary';x.textContent='Exit setup';a.appendChild(k);a.appendChild(x);c.appendChild(a);o.appendChild(c);document.body.appendChild(o);const close=()=>o.remove();k.onclick=close;o.onclick=(e)=>{if(e.target===o)close()};x.onclick=()=>{close();send('cancel')}}
window.__engineEvent=function(e){
  switch(e.event){
    case 'state_update':     window.__lastState=e.state; onPageStateUpdate(e.state); break;
    case 'progress':         updateProgress(e.percent,e.label,e.current,e.total); addLog(e.label,false); break;
    case 'log_line':         addLog(e.text, false); break;
    case 'install_complete': handleInstallComplete(e); break;
  }
};
document.addEventListener('DOMContentLoaded',()=>{
  send('ready');
  _pollTimer = setInterval(() => {
    if (!_installDone) send('get_state');
  }, 300);
  document.getElementById('btn-next').onclick=()=>send('next');
  document.getElementById('btn-cancel').onclick=()=>showCancelModal();
});
</script>
</body></html>
