<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Installer Shell</title>
<style>
:root{--accent:#0078D4;--accent-dark:#005A9E;--bg:#fff;--bg-alt:#F5F5F5;--text:#1A1A1A;--text-muted:#6B6B6B;--border:#E0E0E0;--radius:6px;--font:'Segoe UI',system-ui,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);overflow:hidden;-webkit-font-smoothing:antialiased}
.root{display:flex;flex-direction:column;height:100vh}
.banner{flex-shrink:0;display:flex;align-items:stretch;min-height:96px;background:var(--bg-alt);border-bottom:1px solid var(--border);overflow:hidden}
.brand-tile{width:96px;min-width:96px;background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%);display:flex;align-items:center;justify-content:center}
.banner-logo{width:100%;height:100%;object-fit:cover;display:none}
.banner-logo-ph{width:100%;height:100%;background:rgba(255,255,255,.22)}
.banner-art{flex:1;background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%);background-size:cover;background-position:center}
.center{flex:1;min-height:0;background:var(--bg)}
.page-frame{width:100%;height:100%;border:0;display:block;background:var(--bg)}
.footer{flex-shrink:0;display:flex;justify-content:flex-end;align-items:center;gap:8px;padding:12px 20px;border-top:1px solid var(--border);background:var(--bg-alt)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:7px 20px;border-radius:var(--radius);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;border:1px solid transparent;min-width:90px;transition:background .15s,opacity .15s}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-primary:hover:not(:disabled){background:var(--accent-dark)}
.btn-secondary{background:transparent;color:var(--text);border-color:var(--border)}.btn-secondary:hover:not(:disabled){background:var(--bg-alt)}
.btn-ghost{background:transparent;color:var(--text-muted);border-color:transparent}.btn-ghost:hover:not(:disabled){color:var(--text);background:var(--bg-alt)}
.btn:disabled{opacity:.45;cursor:not-allowed}
</style></head><body>
<div class="root">
  <div class="banner">
    <div class="brand-tile">
      <img id="banner-logo" class="banner-logo" alt="">
      <div id="banner-logo-ph" class="banner-logo-ph"></div>
    </div>
    <div id="banner-art" class="banner-art"></div>
  </div>
  <div class="center">
    <iframe id="page-frame" class="page-frame" title="Installer Page"></iframe>
  </div>
  <div class="footer">
    <button id="btn-cancel" class="btn btn-ghost">Cancel</button>
    <button id="btn-back" class="btn btn-secondary">← Back</button>
    <button id="btn-next" class="btn btn-primary">Next →</button>
  </div>
</div>
<script>
let _state=null;
let _currentPage='';

function send(t,p={}){const m=JSON.stringify({type:t,...p});if(window.chrome&&window.chrome.webview)window.chrome.webview.postMessage(m);else console.log('[→]',m)}

window.__shellPostMessage=function(raw){
  try{
    const msg=typeof raw==='string'?JSON.parse(raw):raw;
    if(msg&&msg.type==='ready')return;
    if(window.chrome&&window.chrome.webview){
      window.chrome.webview.postMessage(typeof raw==='string'?raw:JSON.stringify(msg));
    }
  }catch(e){console.warn('shell relay parse failed',e)}
};

function applyTheme(s){
  const r=document.documentElement;
  r.style.setProperty('--accent',s.accent_color||'#0078D4');
  r.style.setProperty('--accent-dark',s.accent_dark_color||'#005A9E');
  r.style.setProperty('--bg',s.background_color||'#FFFFFF');
  r.style.setProperty('--bg-alt',s.surface_color||'#F5F5F5');
  r.style.setProperty('--text',s.text_color||'#1A1A1A');
  r.style.setProperty('--text-muted',s.text_muted_color||'#6B6B6B');
  r.style.setProperty('--border',s.border_color||'#E0E0E0');
  r.style.setProperty('--radius',(s.border_radius??6)+'px');
  r.style.setProperty('--font',s.font_family||"'Segoe UI',system-ui,sans-serif");

  if(s.logo_b64){
    const l=document.getElementById('banner-logo');
    l.src=(s.logo_b64.startsWith&&s.logo_b64.startsWith('data:'))?s.logo_b64:'data:image/png;base64,'+s.logo_b64;
    l.style.display='block';
    const p=document.getElementById('banner-logo-ph');if(p)p.style.display='none';
  }
  if(s.banner_b64){
    const art=document.getElementById('banner-art');
    const src=(s.banner_b64.startsWith&&s.banner_b64.startsWith('data:'))?s.banner_b64:'data:image/png;base64,'+s.banner_b64;
    art.style.backgroundImage='url('+src+')';
    art.style.backgroundSize='cover';
    art.style.backgroundPosition='center';
  }
}

function navLabel(page,s){
  if(page==='summary')return s&&s.is_uninstall?'Uninstall':'Install';
  if(page==='finish'||page==='error')return 'Close';
  if(page==='install'&&s&&s.install_succeeded===true)return 'Next →';
  return 'Next →';
}

function updateFooter(){
  if(!_state)return;
  const back=document.getElementById('btn-back');
  const next=document.getElementById('btn-next');
  const cancel=document.getElementById('btn-cancel');

  back.disabled=!_state.can_go_back_state;
  next.disabled=(_currentPage!=='finish'&&_currentPage!=='error')?!_state.can_go_next_state:false;
  next.textContent=navLabel(_currentPage,_state);

  const onTerminal=_currentPage==='finish'||_currentPage==='error';
  const hideBack=!_state.can_go_back_state || _currentPage==='welcome';
  cancel.style.display=onTerminal?'none':'inline-flex';
  back.style.display=(onTerminal||hideBack)?'none':'inline-flex';
}

function patchPageHtml(html){
  const injectedStyle='<style>.banner,.footer{display:none !important}.root{height:100vh !important}.content{padding-top:20px !important}html,body{background:transparent !important}</style>';
  const closeScript='</scr'+'ipt>';
  const injectedScript='<script>window.chrome=window.chrome||{};window.chrome.webview=window.chrome.webview||{};window.chrome.webview.postMessage=function(msg){parent.__shellPostMessage(msg)};'+closeScript;
  if(/<head[^>]*>/i.test(html)){
    return html.replace(/<head[^>]*>/i, m=>m+injectedStyle+injectedScript);
  }
  return injectedStyle+injectedScript+html;
}

function loadPageHtml(html){
  const frame=document.getElementById('page-frame');
  frame.onload=()=>{
    if(_state){
      forwardEventToFrame({event:'state_update',state:_state});
    }
  };
  frame.srcdoc=patchPageHtml(html||'');
}

function forwardEventToFrame(event){
  const frame=document.getElementById('page-frame');
  const w=frame&&frame.contentWindow;
  if(w&&typeof w.__engineEvent==='function'){
    try{w.__engineEvent(event);}catch(_){ }
  }
}

window.__engineEvent=function(event){
  switch(event.event){
    case 'state_update':
      _state=event.state;
      applyTheme(_state);
      updateFooter();
      forwardEventToFrame(event);
      break;
    case 'navigate':
      _currentPage=event.page||_currentPage;
      loadPageHtml(event.html||'');
      updateFooter();
      break;
    default:
      forwardEventToFrame(event);
      break;
  }
};

function showCancelConfirm(){
  if(document.getElementById('cancel-modal-overlay')) return;
  const o=document.createElement('div');
  o.id='cancel-modal-overlay';
  o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:9999';
  const c=document.createElement('div');
  c.style.cssText='width:min(420px,calc(100% - 32px));background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 16px 36px rgba(0,0,0,.24);padding:18px';
  c.innerHTML='<div style="font-size:16px;font-weight:600;margin-bottom:6px">Cancel installation?</div><div style="font-size:13px;color:var(--text-muted);line-height:1.5">Setup is not complete. If you exit now, no further changes will be made.</div>';
  const a=document.createElement('div');
  a.style.cssText='display:flex;justify-content:flex-end;gap:8px;margin-top:16px';
  const keep=document.createElement('button');
  keep.className='btn btn-secondary';
  keep.textContent='Continue setup';
  const exit=document.createElement('button');
  exit.className='btn btn-primary';
  exit.textContent='Exit setup';
  a.appendChild(keep);
  a.appendChild(exit);
  c.appendChild(a);
  o.appendChild(c);
  document.body.appendChild(o);
  const close=()=>o.remove();
  keep.onclick=close;
  o.onclick=(e)=>{if(e.target===o)close()};
  exit.onclick=()=>{close();send('cancel')};
}

document.addEventListener('DOMContentLoaded',()=>{
  send('ready');
  document.getElementById('btn-next').onclick=()=>send('next');
  document.getElementById('btn-back').onclick=()=>send('back');
  document.getElementById('btn-cancel').onclick=()=>showCancelConfirm();
});
</script>
</body></html>
