<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Setup Error</title>
<style>
:root{--accent:#C42B1C;--accent-dark:#A4251A;--bg:#fff;--bg-alt:#FFF5F4;--text:#1A1A1A;--text-muted:#6B6B6B;--border:#F5B8B3;--error:#C42B1C;--radius:6px;--font:'Segoe UI',system-ui,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);overflow:hidden;user-select:none;-webkit-font-smoothing:antialiased}
.root{display:flex;flex-direction:column;height:100vh}
.banner{flex-shrink:0;display:flex;align-items:stretch;min-height:96px;background:var(--bg-alt);border-bottom:1px solid var(--border);overflow:hidden}
.brand-tile{width:96px;min-width:96px;background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%);display:flex;align-items:center;justify-content:center}
.banner-logo{width:48px;height:48px;object-fit:contain;display:none}
.banner-logo-ph{width:48px;height:48px;background:rgba(255,255,255,.22);border-radius:8px}
.banner-art{flex:1;background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%);background-size:cover;background-position:center}
.content{flex:1;overflow-y:auto;padding:28px 36px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;animation:fadeIn .2s ease}
.footer{flex-shrink:0;display:flex;justify-content:flex-end;align-items:center;gap:8px;padding:12px 20px;border-top:1px solid #F5B8B3;background:var(--bg-alt)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:7px 20px;border-radius:var(--radius);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;border:1px solid transparent;min-width:100px;transition:background .15s}
.btn-primary{background:#C42B1C;color:#fff;border-color:#C42B1C}.btn-primary:hover{background:#A4251A}
.btn-secondary{background:transparent;color:var(--text);border-color:#F5B8B3}.btn-secondary:hover{background:#FFF0EE}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.error-icon{font-size:68px;line-height:1;animation:shake .5s ease .1s}
.error-title{font-size:22px;font-weight:700;text-align:center;color:var(--error)}
.error-sub{font-size:14px;color:var(--text-muted);text-align:center;line-height:1.65;max-width:440px}
.error-detail{width:100%;max-width:460px;background:#1a0a09;border:1px solid #3a1210;border-radius:var(--radius);padding:12px 14px;font-family:'Cascadia Code','Consolas',monospace;font-size:12px;color:#f7a8a3;line-height:1.6;max-height:140px;overflow-y:auto}
.error-detail::-webkit-scrollbar{width:4px}.error-detail::-webkit-scrollbar-thumb{background:#3a1210;border-radius:2px}
.rollback-note{width:100%;max-width:460px;background:var(--bg-alt);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:12.5px;color:var(--text-muted);line-height:1.6}
</style></head><body>
<div class="root">
  <div class="banner">
    <div class="brand-tile">
      <img id="banner-logo" class="banner-logo" alt="">
      <div id="banner-logo-ph" class="banner-logo-ph"></div>
    </div>
    <div id="banner-art" class="banner-art"></div>
  </div>
  <div class="content">
    <div class="error-icon">❌</div>
    <div class="error-title">Installation Failed</div>
    <div class="error-sub" id="error-sub">
      An error occurred during installation. Any changes made have been rolled back.
    </div>
    <div class="error-detail" id="error-detail">No error details available.</div>
    <div class="rollback-note" id="rollback-note">
      ↩ The installer has attempted to roll back all changes. Your system should be in its original state.
    </div>
  </div>
  <div class="footer">
    <button id="btn-log"   class="btn btn-secondary">View Log</button>
    <button id="btn-close" class="btn btn-primary">Close</button>
  </div>
</div>
<script>
function applyTheme(s){const r=document.documentElement;r.style.setProperty('--accent',s.accent_color||'#0078D4');r.style.setProperty('--accent-dark',s.accent_dark_color||'#005A9E');r.style.setProperty('--accent-light',s.accent_light_color||'#EBF3FB');r.style.setProperty('--bg',s.background_color||'#FFFFFF');r.style.setProperty('--bg-alt',s.surface_color||'#F5F5F5');r.style.setProperty('--text',s.text_color||'#1A1A1A');r.style.setProperty('--text-muted',s.text_muted_color||'#6B6B6B');r.style.setProperty('--border',s.border_color||'#E0E0E0');r.style.setProperty('--radius',(s.border_radius??6)+'px');r.style.setProperty('--font',s.font_family||"'Segoe UI',system-ui,sans-serif");r.style.setProperty('--success',s.success_color||'#107C10');r.style.setProperty('--success-bg',s.success_bg_color||'#F7F9F8');r.style.setProperty('--error',s.error_color||'#C42B1C');r.style.setProperty('--error-bg',s.error_bg_color||'#FFF7F6');r.style.setProperty('--progress',s.progress_color||'#0078D4');r.style.setProperty('--progress-light',s.progress_light_color||'#EBF3FB');}
function onPageStateUpdate(s) {
  applyTheme(s);
  const iconAsset = s.logo_b64;
  if (iconAsset) {
    const l = document.getElementById("banner-logo");
    l.src = (iconAsset.startsWith && iconAsset.startsWith("data:")) ? iconAsset : "data:image/png;base64," + iconAsset;
    l.style.display = "block";
    document.getElementById("banner-logo-ph").style.display = "none";
  }
  const bannerAsset = s.banner_b64;
  if (bannerAsset) {
    const art = document.getElementById("banner-art");
    if (art) {
      const src = (bannerAsset.startsWith && bannerAsset.startsWith("data:")) ? bannerAsset : "data:image/png;base64," + bannerAsset;
      art.style.backgroundImage = "url(" + src + ")";
      art.style.backgroundSize = "cover";
      art.style.backgroundPosition = "center";
    }
  }
  if (s.install_error) {
    document.getElementById('error-detail').textContent = s.install_error;
    document.getElementById('error-sub').textContent =
      s.app_name + ' could not be installed. The error details are shown below.';
  }
}
function send(t,p={}){const m=JSON.stringify({type:t,...p});if(window.chrome&&window.chrome.webview)window.chrome.webview.postMessage(m);else console.log('[→]',m)}
window.__engineEvent=function(e){if(e.event==='state_update')onPageStateUpdate(e.state)};
document.addEventListener('DOMContentLoaded',()=>{
  send('ready');
  document.getElementById('btn-close').onclick=()=>send('cancel');
  document.getElementById('btn-log').onclick=()=>{
    const d=document.getElementById('error-detail');
    d.style.maxHeight=d.style.maxHeight==='none'?'140px':'none';
  };
});
</script>
</body></html>
