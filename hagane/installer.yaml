# yaml-language-server: $schema=../sdk/schema/installer.schema.json

app:
  name: "Hagane"
  version: "0.1.3"
  publisher: "Installer Engine"
  description: "Command-line installer builder for the Installer Engine workspace."
  default_install_dir: "{{INSTALL_ROOT}}"
  registry_key: "InstallerEngine\\Hagane"
  require_admin: true

variables:
  INSTALL_ROOT: "{{PROGRAMFILES64}}/Hagane"
  LOG_DIR: "{{INSTDIR}}/logs"
  HAGANE_EXE: "{{INSTDIR}}/bin/hagane.exe"
  UNINSTALL_KEY: "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Uninstall\\Hagane"
  APP_REG_KEY: "SOFTWARE\\InstallerEngine\\Hagane"

logging:
  mode: auto
  path: "{{LOG_DIR}}"
  file_name: "installation.log"
  timestamp: true
  include_raw_os_error: false
  slow_step_warn_sec: 10

pages:
  - type: welcome
    title: "Welcome to Hagane Setup"
    subtitle: "Install the Hagane command-line tool"

  - type: install_dir
    title: "Choose Installation Folder"

  - type: components
    title: "Choose PATH Scope"

  - type: summary
    title: "Ready to Install"

  - type: install
    title: "Installing Hagane"

  - type: finish
    title: "Setup Complete"

components:
  - id: user_path
    name: "Add to user PATH"
    description: "Make hagane available in your current Windows user profile."
    required: false
    selected: true

  - id: system_path
    name: "Add to system PATH"
    description: "Make hagane available for all users on this machine."
    required: false
    selected: false

install:
  setup:
    create_dirs:
      - "{{INSTDIR}}"
      - "{{INSTDIR}}/bin"

  components:
    user_path:
      archive: "payload.zst"
      target: "{{INSTDIR}}"
    system_path:
      archive: "payload.zst"
      target: "{{INSTDIR}}"

  system:
    register_app:
      key: "{{APP_REG_KEY}}"
      hive: HKLM
      version: "0.1.3"
      install_location: "{{INSTDIR}}"

    register_uninstall:
      key: "{{UNINSTALL_KEY}}"
      hive: HKLM
      name: "Hagane"
      version: "0.1.3"
      publisher: "Installer Engine"
      install_location: "{{INSTDIR}}"
      uninstall: "{{INSTDIR}}/uninstall.exe"
      no_modify: true
      no_repair: true

    path:
      add: "{{INSTDIR}}/bin"
      scope: system

  finalize:
    write_uninstaller: "{{INSTDIR}}/uninstall.exe"
