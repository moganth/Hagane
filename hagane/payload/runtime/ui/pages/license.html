<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>License Agreement</title>
<style>
:root{--accent:#0078D4;--accent-dark:#005A9E;--bg:#fff;--bg-alt:#F5F5F5;--text:#1A1A1A;--text-muted:#6B6B6B;--border:#E0E0E0;--radius:6px;--font:'Segoe UI',system-ui,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);overflow:hidden;user-select:none;-webkit-font-smoothing:antialiased}
.root{display:flex;flex-direction:column;height:100vh}
.banner{flex-shrink:0;display:flex;align-items:stretch;min-height:96px;background:var(--bg-alt);border-bottom:1px solid var(--border);overflow:hidden}
.brand-tile{width:96px;min-width:96px;background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%);display:flex;align-items:center;justify-content:center}
.banner-logo{width:48px;height:48px;object-fit:contain;display:none}
.banner-logo-ph{width:48px;height:48px;background:rgba(255,255,255,.22);border-radius:8px}
.banner-art{flex:1;background:linear-gradient(135deg,var(--accent) 0%,var(--accent-dark) 100%);background-size:cover;background-position:center}
.content{flex:1;overflow:hidden;padding:14px 22px;display:flex;flex-direction:column;gap:8px;animation:fadeIn .2s ease}
.footer{flex-shrink:0;display:flex;justify-content:flex-end;align-items:center;gap:8px;padding:12px 20px;border-top:1px solid var(--border);background:var(--bg-alt)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:7px 20px;border-radius:var(--radius);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;border:1px solid transparent;min-width:90px;transition:background .15s,opacity .15s}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-primary:hover:not(:disabled){background:var(--accent-dark)}
.btn-secondary{background:transparent;color:var(--text);border-color:var(--border)}.btn-secondary:hover:not(:disabled){background:var(--bg-alt)}
.btn-ghost{background:transparent;color:var(--text-muted);border-color:transparent}.btn-ghost:hover{color:var(--text);background:var(--bg-alt)}
.btn:disabled{opacity:.45;cursor:not-allowed}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.page-title{font-size:16px;font-weight:600}.page-desc{font-size:12px;color:var(--text-muted)}
.license-box{flex:1;min-height:0;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;font-size:13px;line-height:1.75;background:var(--bg-alt);white-space:pre-wrap;font-family:'Cascadia Code','Consolas',monospace;color:var(--text)}
.license-box::-webkit-scrollbar{width:6px}.license-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.accept-row{display:flex;align-items:center;gap:10px;padding:4px 0;cursor:pointer;flex-shrink:0}
.accept-row input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.accept-row span{font-size:13px}
</style></head><body>
<div class="root">
  <div class="banner">
    <div class="brand-tile">
      <img id="banner-logo" class="banner-logo" alt="">
      <div id="banner-logo-ph" class="banner-logo-ph"></div>
    </div>
    <div id="banner-art" class="banner-art"></div>
  </div>
  <div class="content">
    <div class="page-title">License Agreement</div>
    <div class="page-desc">Review the license terms below.</div>
    <div class="license-box" id="license-text">Loading license…</div>
    <label class="accept-row">
      <input type="checkbox" id="accept-cb">
      <span>I accept the terms of the license agreement</span>
    </label>
  </div>
  <div class="footer">
    <button id="btn-cancel" class="btn btn-ghost">Cancel</button>
    <button id="btn-back"   class="btn btn-secondary">← Back</button>
    <button id="btn-next"   class="btn btn-primary" disabled>Next →</button>
  </div>
</div>
<script>
function applyTheme(s){const r=document.documentElement;r.style.setProperty('--accent',s.accent_color||'#0078D4');r.style.setProperty('--accent-dark',s.accent_dark_color||'#005A9E');r.style.setProperty('--accent-light',s.accent_light_color||'#EBF3FB');r.style.setProperty('--bg',s.background_color||'#FFFFFF');r.style.setProperty('--bg-alt',s.surface_color||'#F5F5F5');r.style.setProperty('--text',s.text_color||'#1A1A1A');r.style.setProperty('--text-muted',s.text_muted_color||'#6B6B6B');r.style.setProperty('--border',s.border_color||'#E0E0E0');r.style.setProperty('--radius',(s.border_radius??6)+'px');r.style.setProperty('--font',s.font_family||"'Segoe UI',system-ui,sans-serif");r.style.setProperty('--success',s.success_color||'#107C10');r.style.setProperty('--success-bg',s.success_bg_color||'#F7F9F8');r.style.setProperty('--error',s.error_color||'#C42B1C');r.style.setProperty('--error-bg',s.error_bg_color||'#FFF7F6');r.style.setProperty('--progress',s.progress_color||'#0078D4');r.style.setProperty('--progress-light',s.progress_light_color||'#EBF3FB');}
function onPageStateUpdate(s) {
  applyTheme(s);
  const iconAsset = s.logo_b64;
  if (iconAsset) {
    const l = document.getElementById("banner-logo");
    l.src = (iconAsset.startsWith && iconAsset.startsWith("data:")) ? iconAsset : "data:image/png;base64," + iconAsset;
    l.style.display = "block";
    document.getElementById("banner-logo-ph").style.display = "none";
  }
  const bannerAsset = s.banner_b64;
  if (bannerAsset) {
    const art = document.getElementById("banner-art");
    if (art) {
      const src = (bannerAsset.startsWith && bannerAsset.startsWith("data:")) ? bannerAsset : "data:image/png;base64," + bannerAsset;
      art.style.backgroundImage = "url(" + src + ")";
      art.style.backgroundSize = "cover";
      art.style.backgroundPosition = "center";
    }
  }
  const licText = s.license_text || 'No license text provided.';
  document.getElementById('license-text').textContent = licText;
  document.getElementById('accept-cb').checked = s.license && s.license.accepted;
  document.getElementById('btn-next').disabled = !(s.license && s.license.accepted);
}
function send(t,p={}){const m=JSON.stringify({type:t,...p});if(window.chrome&&window.chrome.webview)window.chrome.webview.postMessage(m);else console.log('[→]',m)}
function showCancelModal(){if(document.getElementById('cancel-modal-overlay'))return;const o=document.createElement('div');o.id='cancel-modal-overlay';o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:9999';const c=document.createElement('div');c.style.cssText='width:min(420px,calc(100% - 32px));background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 16px 36px rgba(0,0,0,.24);padding:18px';c.innerHTML='<div style="font-size:16px;font-weight:600;margin-bottom:6px">Cancel installation?</div><div style="font-size:13px;color:var(--text-muted);line-height:1.5">Setup is not complete. If you exit now, no further changes will be made.</div>';const a=document.createElement('div');a.style.cssText='display:flex;justify-content:flex-end;gap:8px;margin-top:16px';const k=document.createElement('button');k.className='btn btn-secondary';k.textContent='Continue setup';const x=document.createElement('button');x.className='btn btn-primary';x.textContent='Exit setup';a.appendChild(k);a.appendChild(x);c.appendChild(a);o.appendChild(c);document.body.appendChild(o);const close=()=>o.remove();k.onclick=close;o.onclick=(e)=>{if(e.target===o)close()};x.onclick=()=>{close();send('cancel')}}
window.__engineEvent=function(e){if(e.event==='state_update')onPageStateUpdate(e.state)};
document.addEventListener('DOMContentLoaded',()=>{
  send('ready');
  const cb=document.getElementById('accept-cb');
  cb.addEventListener('change',()=>{
    send('license_accepted',{accepted:cb.checked});
    document.getElementById('btn-next').disabled=!cb.checked;
  });
  document.getElementById('btn-next').onclick=()=>{if(cb.checked)send('next')};
  document.getElementById('btn-back').onclick=()=>send('back');
  document.getElementById('btn-cancel').onclick=()=>showCancelModal();
});
</script>
</body></html>
