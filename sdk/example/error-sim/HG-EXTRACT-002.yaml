app:
  name: "SimExtractDest"
  version: "1.0.0"
  publisher: "Acme"
  require_admin: false

logging:
  mode: manual_only
  path: "$TEMP\\HaganeErrorSim\\logs"
  file_name: "installation.log"
  timestamp: true

pages:
  - type: install

steps:
  - action: log_ui
    level: info
    message: "Testing extract destination write failure"
  - action: log_file
    level: info
    message: "Testing extract destination write failure"
  - action: extract
    archive: "payload.zst"
    destination: "$INSTDIR\\bad<name>"

