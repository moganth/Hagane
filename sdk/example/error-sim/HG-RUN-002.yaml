app:
  name: "SimRunNonZero"
  version: "1.0.0"
  publisher: "Acme"
  require_admin: false

logging:
  mode: manual_only
  path: "$TEMP\\HaganeErrorSim\\logs"
  file_name: "installation.log"
  timestamp: true

pages:
  - type: install

steps:
  - action: log_ui
    level: info
    message: "Testing non-zero process exit"
  - action: log_file
    level: info
    message: "Testing non-zero process exit"
  - action: run_program
    executable: "cmd.exe"
    arguments: "/c exit 7"
    wait: true

