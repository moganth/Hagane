app:
  name: "SimPsAccessDenied"
  version: "1.0.0"
  publisher: "Acme"
  require_admin: false

logging:
  mode: manual_only
  path: "$TEMP\\HaganeErrorSim\\logs"
  file_name: "installation.log"
  timestamp: true

pages:
  - type: install

steps:
  - action: log_ui
    level: info
    message: "Testing PowerShell policy/access denial (run as standard user)"
  - action: log_file
    level: info
    message: "Testing PowerShell policy/access denial (run as standard user)"
  - action: run_powershell
    script: "Get-Content 'C:\\Windows\\System32\\config\\SAM'"
    wait: true
    fail_on_nonzero: true
    timeout_sec: 10

