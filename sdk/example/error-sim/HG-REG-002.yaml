app:
  name: "SimRegDenied"
  version: "1.0.0"
  publisher: "Acme"
  require_admin: false

logging:
  mode: manual_only
  path: "$TEMP\\HaganeErrorSim\\logs"
  file_name: "installation.log"
  timestamp: true

pages:
  - type: install

steps:
  - action: log_ui
    level: info
    message: "Testing registry access denied (run as standard user)"
  - action: log_file
    level: info
    message: "Testing registry access denied (run as standard user)"
  - action: registry
    operation: write
    hive: HKLM
    key: "SAM\\RegDeniedSim"
    value_name: "InstallDir"
    value_type: SZ
    value_data: "$INSTDIR"

