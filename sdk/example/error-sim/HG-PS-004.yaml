app:
  name: "SimPsTimeout"
  version: "1.0.0"
  publisher: "Acme"
  require_admin: false

logging:
  mode: manual_only
  path: "$TEMP\\HaganeErrorSim\\logs"
  file_name: "installation.log"
  timestamp: true

pages:
  - type: install

steps:
  - action: log_ui
    level: info
    message: "Testing PowerShell timeout"
  - action: log_file
    level: info
    message: "Testing PowerShell timeout"
  - action: run_powershell
    script: "Start-Sleep -Seconds 20"
    wait: true
    fail_on_nonzero: true
    timeout_sec: 1

