# -- MyApp Installer Definition -------------------------------------------------
# Build with: iebuild --manifest installer.yaml --build
# Silent:     MyApp-setup.exe /S

app:
  name: "MyApp"
  version: "2.1.0"
  publisher: "Acme Corporation"
  description: "A fast, modern productivity application for Windows."
  website: "https://example.com"
  support_url: "https://example.com/support"
  logo: "assets/logo.png"
  banner: "assets/banner.png"
  icon: "assets/icon.ico"
  default_install_dir: "{{INSTALL_ROOT}}"
  registry_key: "{{COMPANY_PRODUCT}}"
  require_admin: true

variables:
  COMPANY: "Acme"
  PRODUCT: "MyApp"
  COMPANY_PRODUCT: "{{COMPANY}}/{{PRODUCT}}"
  INSTALL_ROOT: "{{PROGRAMFILES64}}/{{COMPANY}}/{{PRODUCT}}"
  LOG_DIR: "{{INSTDIR}}/logs"
  APP_EXE: "{{INSTDIR}}/MyApp.exe"
  UNINSTALL_KEY: "SOFTWARE/Microsoft/Windows/CurrentVersion/Uninstall/AcmeMyApp"
  APP_REG_KEY: "SOFTWARE/{{COMPANY_PRODUCT}}"

logging:
  mode: auto
  path: "{{LOG_DIR}}"
  file_name: "installation.log"
  timestamp: true
  include_raw_os_error: false
  slow_step_warn_sec: 10

theme:
  accent_color: "#0F6CBD"
  accent_dark_color: "#0B4F9A"
  accent_light_color: "#DCEBFA"
  background_color: "#FFFFFF"
  surface_color: "#F7F9FC"
  text_color: "#1A1A1A"
  text_muted_color: "#667085"
  border_color: "#D0D7E2"
  success_color: "#107C10"
  success_bg_color: "#F3FAF4"
  error_color: "#C42B1C"
  error_bg_color: "#FFF4F2"
  font_family: "'Segoe UI', system-ui, sans-serif"
  border_radius: 6
  window_width: 780
  window_height: 540
  banner_position: top

pages:
  - type: welcome
    title: "Welcome to MyApp Setup"
    subtitle: "Version 2.1.0"

  - type: license
    title: "License Agreement"
    license_file: "docs/LICENSE.txt"

  - type: requirements
    title: "System Requirements Check"

  - type: install_dir
    title: "Choose Installation Folder"

  - type: components
    title: "Select Components"

  - type: summary
    title: "Ready to Install"

  - type: install
    title: "Installing MyApp"

  - type: finish
    title: "Setup Complete"

requirements:
  - type: os
    platform: windows
    min_build: 18362        # Windows 10 1903+
    label: "Windows 10 1903 or newer"

  - type: ram
    min_mb: 2048
    label: "2 GB RAM minimum"

  - type: disk
    min_mb: 512
    path: "{{INSTDIR}}"
    label: "512 MB free disk space"

  - type: dotnet
    min_version: "4.8"
    label: ".NET Framework 4.8"


components:
  - id: core
    name: "Core Application"
    description: "The main application files. Required."
    size_mb: 120
    required: true
    selected: true

  - id: docs
    name: "Documentation"
    description: "PDF user manual and help files."
    size_mb: 18
    required: false
    selected: true

  - id: samples
    name: "Sample Files"
    description: "Example projects and templates to get you started."
    size_mb: 34
    required: false
    selected: false

  - id: cli
    name: "Command Line Tools"
    description: "myapp.exe CLI - adds to system PATH."
    size_mb: 8
    required: false
    selected: false

install:
  setup:
    create_dirs:
      - "{{INSTDIR}}"
      - "{{LOG_DIR}}"

  components:
    core:
      archive: "payload.zst"
      target: "{{INSTDIR}}"
    docs:
      archive: "docs.zst"
      target: "{{INSTDIR}}/docs"
    samples:
      archive: "samples.zst"
      target: "{{INSTDIR}}/samples"

  system:
    register_app:
      key: "{{APP_REG_KEY}}"
      hive: HKLM
      version: "2.1.0"
      install_location: "{{INSTDIR}}"

    register_uninstall:
      key: "{{UNINSTALL_KEY}}"
      hive: HKLM
      name: "MyApp 2.1.0"
      version: "2.1.0"
      publisher: "Acme Corporation"
      install_location: "{{INSTDIR}}"
      uninstall: "{{INSTDIR}}/uninstall.exe"
      estimated_size_kb: 180224
      no_modify: true
      no_repair: true

    shortcuts:
      - name: "MyApp"
        target: "{{APP_EXE}}"
        location: desktop
        description: "Launch MyApp"
        icon: "{{APP_EXE}}"
        working_dir: "{{INSTDIR}}"
        component: core

      - name: "MyApp"
        target: "{{APP_EXE}}"
        location: start_menu
        description: "Launch MyApp"
        icon: "{{APP_EXE}}"
        working_dir: "{{INSTDIR}}"
        component: core

      - name: "MyApp User Manual"
        target: "{{INSTDIR}}/docs/UserManual.pdf"
        location: start_menu
        component: docs

    path:
      add: "{{INSTDIR}}/bin"
      scope: system

  hooks:
    post_install:
      - run:
          command: "Write-Host 'MyApp post-install validation completed'"
          shell: powershell
          wait: true
          fail_on_nonzero: true
          timeout_sec: 30

  finalize:
    write_uninstaller: "{{INSTDIR}}/uninstall.exe"

uninstall:
  display_name: "MyApp 2.1.0"
  publisher: "Acme Corporation"

silent:
  install_dir: "{{INSTALL_ROOT}}"
  components:
    - core
    - cli
