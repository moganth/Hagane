# -- MyApp Installer Definition -------------------------------------------------
# Build with: iebuild --manifest installer.yaml --build
# Silent:     MyApp-setup.exe /S

app:
  name: "MyApp"
  version: "2.1.0"
  publisher: "Acme Corporation"
  description: "A fast, modern productivity application for Windows."
  website: "https://example.com"
  support_url: "https://example.com/support"
  logo: "assets/logo.png"
  banner: "assets/banner.png"
  icon: "assets/icon.ico"
  default_install_dir: "$INSTALL_ROOT"
  registry_key: "$COMPANY_PRODUCT"
  require_admin: true

variables:
  COMPANY: "Acme"
  PRODUCT: "MyApp"
  COMPANY_PRODUCT: "$COMPANY\\$PRODUCT"
  INSTALL_ROOT: "$PROGRAMFILES64\\$COMPANY\\$PRODUCT"
  LOG_DIR: "$INSTDIR\\logs"
  APP_EXE: "$INSTDIR\\MyApp.exe"
  UNINSTALL_KEY: "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Uninstall\\AcmeMyApp"
  APP_REG_KEY: "SOFTWARE\\$COMPANY_PRODUCT"

logging:
  mode: manual_only
  path: "$LOG_DIR"
  file_name: "installation.log"
  timestamp: true
  include_raw_os_error: false

theme:
  accent_color: "#0F6CBD"
  accent_dark_color: "#0B4F9A"
  accent_light_color: "#DCEBFA"
  background_color: "#FFFFFF"
  surface_color: "#F7F9FC"
  text_color: "#1A1A1A"
  text_muted_color: "#667085"
  border_color: "#D0D7E2"
  success_color: "#107C10"
  success_bg_color: "#F3FAF4"
  error_color: "#C42B1C"
  error_bg_color: "#FFF4F2"
  font_family: "'Segoe UI', system-ui, sans-serif"
  border_radius: 6
  window_width: 780
  window_height: 540
  banner_position: top

