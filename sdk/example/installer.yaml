pages:
  - type: welcome
    title: "Welcome to MyApp Setup"
    subtitle: "Version 2.1.0"

  - type: license
    title: "License Agreement"
    license_file: "docs/LICENSE.txt"

  - type: requirements
    title: "System Requirements Check"

  - type: install_dir
    title: "Choose Installation Folder"

  - type: components
    title: "Select Components"

  - type: summary
    title: "Ready to Install"

  - type: install
    title: "Installing MyApp"

  - type: finish
    title: "Setup Complete"

requirements:
  - type: os
    platform: windows
    min_build: 18362        # Windows 10 1903+
    label: "Windows 10 1903 or newer"

  - type: ram
    min_mb: 2048
    label: "2 GB RAM minimum"

  - type: disk
    min_mb: 512
    path: "$INSTDIR"
    label: "512 MB free disk space"

  - type: dotnet
    min_version: "4.8"
    label: ".NET Framework 4.8"


components:
  - id: core
    name: "Core Application"
    description: "The main application files. Required."
    size_mb: 120
    required: true
    selected: true

  - id: docs
    name: "Documentation"
    description: "PDF user manual and help files."
    size_mb: 18
    required: false
    selected: true

  - id: samples
    name: "Sample Files"
    description: "Example projects and templates to get you started."
    size_mb: 34
    required: false
    selected: false

  - id: cli
    name: "Command Line Tools"
    description: "myapp.exe CLI - adds to system PATH."
    size_mb: 8
    required: false
    selected: false

steps:
  # -- Manual logging examples (error codes are emitted automatically) -------
  - action: log_both
    level: info
    message: "Manifest loaded and validated"

  # -- Create install directory -----------------------------------------------
  - action: log_both
    level: info
    message: "Resolving installation path"

  - action: create_dir
    path: "$INSTDIR"

  - action: log_both
    level: info
    message: "Preparing logs directory"

  - action: create_dir
    path: "$LOG_DIR"

  # -- Extract main payload ---------------------------------------------------
  - action: log_both
    level: info
    message: "Extracting core payload"

  - action: extract
    archive: "payload.zst"
    destination: "$INSTDIR"
    component: core

  - action: log_both
    level: info
    message: "Extracting documentation payload"

  - action: extract
    archive: "docs.zst"
    destination: "$INSTDIR\\docs"
    component: docs

  - action: log_both
    level: info
    message: "Extracting sample payload"

  - action: extract
    archive: "samples.zst"
    destination: "$INSTDIR\\samples"
    component: samples

  # -- Registry - Add/Remove Programs entry ---------------------------------
  - action: log_both
    level: info
    message: "Writing uninstall registry entries"

  - action: register_uninstall
    hive: HKLM
    key: "$UNINSTALL_KEY"
    name: "MyApp 2.1.0"
    version: "2.1.0"
    publisher: "Acme Corporation"
    inst_loc: "$INSTDIR"
    uninstall: "$INSTDIR\\uninstall.exe"
    estimated_size_kb: 180224
    no_modify: true
    no_repair: true

  # -- App registry settings -------------------------------------------------
  - action: log_both
    level: info
    message: "Writing application registry settings"

  - action: register_app
    hive: HKLM
    key: "$APP_REG_KEY"
    inst_loc: "$INSTDIR"
    version: "2.1.0"

  # -- Shortcuts -------------------------------------------------------------
  - action: log_both
    level: info
    message: "Creating shortcuts"

  - action: shortcut
    target: "$APP_EXE"
    location: desktop
    name: "MyApp"
    description: "Launch MyApp"
    icon: "$APP_EXE"
    working_dir: "$INSTDIR"
    component: core

  - action: shortcut
    target: "$APP_EXE"
    location: start_menu
    name: "MyApp"
    description: "Launch MyApp"
    icon: "$APP_EXE"
    working_dir: "$INSTDIR"
    component: core

  - action: shortcut
    target: "$INSTDIR\\docs\\UserManual.pdf"
    location: start_menu
    name: "MyApp User Manual"
    component: docs

  # -- CLI tools - add to PATH -----------------------------------------------
  - action: log_both
    level: info
    message: "Updating PATH for command line tools"

  - action: env_var
    name: PATH
    value: "$INSTDIR\\bin"
    scope: system
    operation: append

  # -- PowerShell example step -----------------------------------------------
  - action: log_both
    level: info
    message: "Running post-install PowerShell check"

  - action: run_powershell
    script: "Write-Host 'MyApp post-install validation completed'"
    wait: true
    fail_on_nonzero: true
    timeout_sec: 30

  # -- Write uninstaller -----------------------------------------------------
  - action: log_both
    level: info
    message: "Writing uninstaller"

  - action: write_uninstaller
    path: "$INSTDIR\\uninstall.exe"

uninstall:
  display_name: "MyApp 2.1.0"
  publisher: "Acme Corporation"

silent:
  install_dir: "$INSTALL_ROOT"
  components:
    - core
    - cli
